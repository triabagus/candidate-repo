name: agency-client-site

# Local environment for the "inherited client site" exercise.
# Bring it up with:  docker compose up -d
# Then finish the WordPress install in your browser at http://localhost:8080
#
# The agency-client-plugin is bind-mounted into the container, so any edit you
# make on your machine is reflected live inside WordPress.

services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-agency}
      MYSQL_USER: ${MYSQL_USER:-agency}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-agency}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  wordpress:
    image: wordpress:6.5-php8.2-apache
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${WP_PORT:-8080}:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE:-agency}
      WORDPRESS_DB_USER: ${MYSQL_USER:-agency}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD:-agency}
      WORDPRESS_DEBUG: ${WORDPRESS_DEBUG:-1}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', false);
        // Local-only: point the partner-authority lookup at the bundled mock API so the
        // demo shows live numbers. In production this falls back to the real external API.
        define('ACP_AUTHORITY_API', 'http://mock-api/authority');
    volumes:
      - wp_core:/var/www/html
      - ./wp-content/plugins/agency-client-plugin:/var/www/html/wp-content/plugins/agency-client-plugin

  # Stand-in for the external "domain authority" service the plugin calls. Deliberately adds
  # ~250ms latency per request so the performance bug in the partner feed is easy to feel.
  mock-api:
    image: php:8.2-cli-alpine
    restart: unless-stopped
    volumes:
      - ./tools/mock-api:/app:ro
    working_dir: /app
    command: ["php", "-S", "0.0.0.0:80", "router.php"]

  # One-shot helper. Use it to install WP and activate the plugin from the CLI
  # instead of clicking through the installer, e.g.:
  #   docker compose run --rm wpcli core install --url=http://localhost:8080 \
  #     --title="Agency Client" --admin_user=admin --admin_password=admin \
  #     --admin_email=dev@example.test --skip-email
  #   docker compose run --rm wpcli plugin activate agency-client-plugin
  wpcli:
    image: wordpress:cli-php8.2
    depends_on:
      db:
        condition: service_healthy
    user: "33:33"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE:-agency}
      WORDPRESS_DB_USER: ${MYSQL_USER:-agency}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD:-agency}
    volumes:
      - wp_core:/var/www/html
      - ./wp-content/plugins/agency-client-plugin:/var/www/html/wp-content/plugins/agency-client-plugin
    entrypoint: wp
    command: ["--info"]

  # One-command demo provisioner. Installs WordPress, activates the plugin, seeds sample
  # Case Studies, and builds the one-page landing site that exercises the plugin.
  #   docker compose --profile setup run --rm wp-setup
  wp-setup:
    image: wordpress:cli-php8.2
    profiles: ["setup"]
    depends_on:
      db:
        condition: service_healthy
      wordpress:
        condition: service_started
    user: "33:33"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE:-agency}
      WORDPRESS_DB_USER: ${MYSQL_USER:-agency}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD:-agency}
      WP_URL: http://localhost:${WP_PORT:-8080}
      WP_ADMIN_USER: ${WP_ADMIN_USER:-admin}
      WP_ADMIN_PASS: ${WP_ADMIN_PASS:-admin}
    volumes:
      - wp_core:/var/www/html
      - ./wp-content/plugins/agency-client-plugin:/var/www/html/wp-content/plugins/agency-client-plugin
      - ./bin:/seed:ro
    entrypoint: ["sh", "/seed/seed.sh"]

volumes:
  db_data:
  wp_core:
